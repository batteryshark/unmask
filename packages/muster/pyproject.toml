[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "muster"
version = "0.0.1"
description = "A ledgered investigation runtime — durable, coverage-gated, resumable work-graph execution with bounded adaptive model steps. The provable-workload core behind unmask / lucent / rekit-factory."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Mario Mercaldi" }]
keywords = ["workflow", "graph", "ledger", "coverage", "durable", "resumable", "investigation"]

# The core is deliberately light: run identity + on-disk layout + the SQLite ledger +
# the graph runner. A consumer registers its domain (tables, nodes, handlers). Bounded
# model steps (review/verify/leads) are an optional extra so the core stays dependency-
# free for consumers that don't use them.
dependencies = [
    "pydantic-graph>=0.0.1",
]

[project.optional-dependencies]
# Bounded, typed model steps (adversarial-verify, lead proposers, reviewers).
model = ["pydantic-ai>=0.0.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/muster"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "unmask-re"
version = "0.0.1"
description = "unmask reverse-engineering skills — binary triage, decompilers, sandboxed tool execution. The heavy half of MCD (persona 2)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "batteryshark" }]

# Heavy deps live here, not in core. Kept minimal in the stub; real providers add
# lief/capstone/unicorn and manage external tools (jadx/ghidra/ilspy) out of band.
# Everything (vendoring + runtime) reads plain JSON — rekit's registry.json at sync
# time, the generated skills-manifest.json at run time — so no YAML parser is needed.
dependencies = ["unmask"]

# Registering here is what makes core's ResolveToolchain see RE capabilities.
# Without unmask-re installed, this group is empty and binaries are a blind spot.
[project.entry-points."unmask.providers"]
re = "unmask_re.provider:provider"

[tool.hatch.build.targets.wheel]
packages = ["src/unmask_re"]
# The vendored skills ship as data files alongside the provider: self-contained
# runtime payloads (pure-stdlib runners, vendored node_modules for js-deobfuscate,
# vendored decompyle3 site for pyc-decompile). Without these in the wheel the
# provider has nothing to shell out to. Re-vendor with `scripts/sync_skills.py`.
artifacts = [
    "skills/**/SKILL.md",
    "skills/**/*.py",
    "skills/**/*.mjs",
    "skills/**/*.js",
    "skills/**/*.sh",
    "skills/**/*.json",
    "skills/**/*.md",
    "skills/skills-manifest.json",
]
# node_modules (js-deobfuscate) and site (pyc-decompile) are large vendored deps
# with non-.py extensions; force-include the whole skills tree so nothing is
# silently dropped by the .py-only wheel builder.
force-include = { "skills" = "skills" }

[tool.hatch.build.targets.sdist]
include = ["src/unmask_re", "skills", "scripts", "README.md", "pyproject.toml"]
